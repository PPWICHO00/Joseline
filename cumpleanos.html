<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joseline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fondo Morado Animado Ultra Lento */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .liquid-bg {
            background: linear-gradient(-45deg, #1A0B2E, #3B185F, #2A0845, #150050);
            background-size: 400% 400%;
            animation: gradientBG 40s ease infinite;
        }

        /* Efecto Cristal Premium */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 50px 0 rgba(0, 0, 0, 0.5);
        }

        /* Transición de Carátulas Suave */
        .slide-container { position: relative; overflow: hidden; }
        .slide-item {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transition: transform 2.8s cubic-bezier(0.2, 1, 0.3, 1), opacity 2.8s ease;
        }
        .slide-left { transform: translateX(-100%); opacity: 0; }
        .slide-right { transform: translateX(100%); opacity: 0; }
        .slide-center { transform: translateX(0); opacity: 1; }

        /* Letras tipo Spotify - Lectura Ultra Pausada */
        .lyric-line {
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.15;
            transform: scale(0.9);
            transform-origin: center;
            line-height: 1.8;
            text-align: center;
        }
        .lyric-active {
            opacity: 1;
            transform: scale(1.03);
            background: linear-gradient(90deg, #e9d5ff 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            text-shadow: 0px 0px 20px rgba(192, 132, 252, 0.3);
        }
        
        #lyricsContainer::-webkit-scrollbar { display: none; }
        #lyricsContainer { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }

        /* Partículas Mágicas */
        @keyframes float-particle {
            0% { transform: translateY(0px) scale(0.5); opacity: 0; }
            50% { opacity: 0.4; transform: translateY(-80px) scale(1.2); }
            100% { transform: translateY(-160px) scale(0.5); opacity: 0; }
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: float-particle infinite ease-in-out;
        }

        /* Aura de la portada */
        .cover-glow {
            position: absolute;
            inset: -10px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, transparent 75%);
            filter: blur(30px);
            opacity: 0;
            z-index: -1;
            transition: opacity 2s ease;
        }
        .glow-active { opacity: 0.8; animation: pulse-glow 8s infinite alternate ease-in-out; }
        @keyframes pulse-glow {
            0% { transform: scale(0.9); opacity: 0.3; }
            100% { transform: scale(1.1); opacity: 0.7; }
        }

        /* Apagón Final */
        @keyframes broken-bulb {
            0% { opacity: 0; background: white; }
            10% { opacity: 1; background: black; }
            20% { opacity: 0.1; background: black; }
            30% { opacity: 1; background: black; }
            100% { opacity: 1; background: black; }
        }
        .broken-bulb-active { display: block !important; animation: broken-bulb 1.8s forwards; }

        /* Botón Play Centrado Absoluto */
        .btn-circle {
            width: 72px; height: 72px;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="min-h-[100dvh] liquid-bg flex items-start justify-center p-4 pt-8 text-white font-sans overflow-hidden relative">

    <div id="blackoutScreen" class="fixed inset-0 z-[100] bg-black hidden pointer-events-none"></div>
    <div id="particles-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <audio id="audio1" preload="auto"></audio>
    <audio id="audio2" preload="auto"></audio>

    <!-- 1. PANTALLA DE CONTRASEÑA -->
    <div id="loginScreen" class="absolute inset-0 z-50 flex items-center justify-center bg-[#0d041a]/95 backdrop-blur-3xl transition-opacity duration-[2000ms]">
        <div class="w-full max-w-[320px] flex flex-col items-center gap-10 relative z-10">
            <div class="relative w-full">
                <input type="password" id="pwdInput" 
                       class="w-full glass bg-white/5 rounded-full px-6 py-5 text-white placeholder-white/20 outline-none text-center text-3xl tracking-[0.4em] font-light shadow-2xl border border-white/20" 
                       placeholder="••••••" autocomplete="off">
            </div>
            <button id="loginBtn" class="w-20 h-20 rounded-full bg-white/10 flex items-center justify-center transition-all duration-700 transform hover:scale-110 shadow-xl border border-white/10 group">
                <span id="loginBtnText" class="relative z-10">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-8 h-8 group-hover:translate-x-1 transition-transform"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </span>
            </button>
        </div>
    </div>

    <!-- 2. REPRODUCTOR PRINCIPAL -->
    <div id="mainPlayer" class="w-full max-w-[360px] h-[85dvh] max-h-[750px] flex flex-col justify-between p-6 glass rounded-[2.5rem] opacity-0 scale-95 transition-all duration-[1500ms] hidden">
        
        <div class="text-center w-full z-10">
            <p class="text-[10px] font-bold text-white/40 tracking-[0.5em] uppercase">Para: Joseline</p>
        </div>

        <!-- Portada -->
        <div class="relative mt-4 mb-4 z-10 mx-auto w-[85%]">
            <div id="glowCover" class="cover-glow"></div>
            <div id="coverContainer" class="w-full aspect-square rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.8)] slide-container border border-white/5">
                <img id="coverImg" src="" alt="Portada" class="slide-item slide-center w-full h-full object-cover object-center">
                <img id="coverImgNext" src="" alt="Portada" class="slide-item slide-right w-full h-full object-cover object-center hidden">
            </div>
        </div>

        <!-- Texto / Letras (Más centrado y visible) -->
        <div class="flex-1 w-full relative mb-4 z-10 min-h-[140px] flex flex-col justify-center overflow-hidden">
            <div id="lyricsWrapper" class="absolute inset-0 overflow-hidden hidden flex-col transition-opacity duration-[1500ms] opacity-0">
                <div id="lyricsContainer" class="flex-1 overflow-y-auto px-2 pb-8 pt-2 space-y-6"></div>
            </div>

            <div id="trackInfoContainer" class="absolute inset-0 flex flex-col items-center justify-center transition-opacity duration-[1500ms] opacity-100 text-center">
                <h1 id="trackTitle" class="text-2xl font-bold tracking-tight text-white mb-2 px-2">Título</h1>
                <p id="trackArtist" class="text-purple-300/60 text-lg font-light">Artista</p>
            </div>
        </div>

        <!-- Barra de Progreso Minimalista -->
        <div class="mb-6 z-10 px-2">
            <div class="w-full bg-white/10 rounded-full h-[2px] relative">
                <div id="progressBar" class="bg-white h-full rounded-full w-0 relative transition-all duration-300 ease-linear">
                    <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-white rounded-full shadow-lg"></div>
                </div>
            </div>
            <div class="flex justify-between text-[10px] text-white/20 mt-3 font-mono">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- Controles Corregidos -->
        <div class="flex justify-center items-center gap-8 mb-4 z-10">
            <button id="prevBtn" class="text-white/30 hover:text-white transition-all duration-500">
                <svg viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <button id="playBtn" class="bg-white text-purple-950 rounded-full btn-circle hover:scale-105 transition-all duration-500 shadow-xl relative overflow-hidden">
                <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" class="w-9 h-9 ml-1 absolute"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" class="w-9 h-9 hidden absolute"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            
            <button id="nextBtn" class="text-white/30 hover:text-white transition-all duration-500">
                <svg viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const playlist = [
            {
                title: "Home", artist: "Edith Whiskers", img: "imagen1.png", audio: "cancion1.mp3", duration: 80,
                lyrics: ["Hola señorita Joseline,", "dependiendo de la hora y tiempo en que lea esto, buenos días, tardes o noches.", "Eh aquí mi pequeño proyecto para usted,", "donde le presento ciertas canciones que me recuerdan y relaciono con usted.", "Y pues no puedo empezar sin más que con esta canción titulada Home,", "que significa mucho para nosotros.", "Principalmente esta canción me transmite un poco de tristeza", "porque sé que no está usted conmigo...", "pero sigue siendo mi hogar y más en un día como hoy que es su cumpleaños.", "Reiterando que sigue siendo mi hogar, y un lugar seguro.", "Esta canción la elegí al principio porque es la que más me recuerda a usted,", "y también se la quiero dedicar hoy día de su cumpleaños.", "Espero que se la pase muy bonito y sea muy feliz.", "Desde lejos le mando un abrazo. Le quiero."]
            },
            {
                title: "Somewhere only we know", artist: "Keane", img: "imagen2.png", audio: "cancion2.mp3", duration: 95,
                lyrics: ["Ahora nos vamos con Somewhere Only We Know.", "Especialmente me gusta esta canción porque me recuerda a usted", "y al lugar que 'solo nosotros conocemos' (los columpios).", "Un lugar muy bonito donde pasábamos el rato cuando nos sentíamos tristes,", "y donde podíamos llorar a gusto.", "Un lugar al que me gusta ir de vez en cuando", "solo para sentir esa sensación como cuando estaba ahí con usted.", "Siéndole sincero, es uno de mis lugares favoritos,", "y lo mantengo en la memoria como un lugar al que si me siento triste o necesito algo,", "sé que en ese lugar puedo sentirme mejor y recordarla por unos instantes.", "Aún recuerdo todas las cosas que dijimos y pasamos ahí.", "Es como si hubiera sido ayer, cuando una personita me dijo", "que aún faltaba mucho tiempo para separarnos.", "Hoy me doy cuenta que solo era optimista para el bien de los dos,", "pero en el interior sentía que había un vacío casi infinito...", "o al menos un vacío sin fin dentro de mí.", "Así que sí, ese es mi lugar favorito.", "Le quiero."]
            },
            {
                title: "Summer Child", artist: "Conan Gray", img: "imagen3.png", audio: "cancion3.mp3", duration: 85,
                lyrics: ["Y ahora nos movemos con otra canción de Conan Gray,", "la cual prácticamente no escuchaba...", "pero alguien me inculcó sus gustos musicales,", "que realmente son impresionantes, tiene un buen gusto.", "Esta canción principalmente la puse por un motivo:", "un día le pedí una canción a una señorita, a un pandita rojo,", "y me recomendó esta canción.", "Desde ese entonces la escucho mínimo una vez por semana,", "y podría decir que es mi canción favorita de este artista.", "Y creo que esta canción me representa mucho,", "porque por dentro me siento vacío aunque yo demuestre lo contrario,", "y eso tiene alguna razón...", "el querer a alguien que ya no está a su lado.", "Fin de este cuento.", "(No pude con la presión)", "Le quiero."]
            },
            {
                title: "Chasing Shadows", artist: "Alex Warren", img: "imagen4.png", audio: "cancion4.mp3", duration: 115,
                lyrics: ["Esta canción la he escuchado recientemente, y me recuerda mucho a usted,", "porque muy profundamente dentro de mí, la extraño.", "Se vienen vagos recuerdos a mi mente cuando la iba a dejar a su casa", "o la esperaba a la salida de la prepa, extraño mucho eso.", "Aún cuando a veces sentía que perdía un poco de tiempo,", "pero realmente no era eso, sino que era algo importante,", "era un vínculo que nos unía más.", "Entendí que no perdía mi tiempo, sino que me sentía bien,", "y si lo piensa, no, no me molestaba esperarla.", "Aunque era aburrido, me gustaba hacerlo.", "Aunque no jugara con usted, me gustaba estar ahí,", "por si necesitaba algo o a alguien.", "Extraño muchas cosas de usted,", "pero no me pondré a hacer una lista ahora mismo, estaría desperdiciando su tiempo.", "Algún día le cumpliré todas las promesas que le hice,", "y si en algún momento no cumplo mi promesa, fallaré como un hombre.", "Sin más.", "Le quiero."]
            },
            {
                title: "Home", artist: "Edward Sharpe & The Magnetic Zeros", img: "imagen5.png", audio: "cancion5.mp3", duration: 100,
                lyrics: ["Y ahora sí, culminando nuevamente con esta canción...", "Esta canción más que tristeza, me da mucha nostalgia y me llena de recuerdos.", "De todas las aventuras que tuvimos, aunque hayan sido pocas, han sido las mejores.", "Esta canción me hace extrañar tu voz y tu sonrisa,", "pero para todo esto ya tendré tiempo de decírtelo en persona.", "Me desvié un poco de la razón principal que era felicitarte,", "y pues más que nada deseo y espero que te la pases muy bien hoy, princesa.", "Espero que seas feliz, aunque sé que lo eres y mucho.", "Espero que te vaya muy bien en la vida y espero salgas adelante.", "Espero que seas una gran ingeniera y lo que más espero es ir a un lugar que le prometí.", "Nous partirons et vivrons de nombreuses aventures à Paris, en France,", "et nous visiterons la tour Eiffel...", "Es mi promesa más importante la cual quiero cumplirle.", "Y sin más que decir, feliz cumpleaños ingeniera Joseline.", "Feliz cumpleaños pandita rojo.", "Feliz cumpleaños corazón de melón.", "Feliz cumpleaños princesa.", "💜"]
            }
        ];

        const PASSWORD_CORRECTA = "joseline240307";
        let currentTrack = 0, isPlaying = false, progressInterval, currentSeconds = 0;
        const audio1 = document.getElementById('audio1'), audio2 = document.getElementById('audio2');
        let activeAudio = audio1, isFirstPlay = true, fadeOutInt, fadeInInt;
        let t1, t2, t3;
        let canHighlightLyrics = false;

        function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const s = (Math.random() * 3 + 2) + 'px';
                p.style.width = s; p.style.height = s;
                p.style.left = Math.random() * 100 + 'vw'; p.style.top = Math.random() * 100 + 'vh';
                p.style.animationDuration = (Math.random() * 12 + 10) + 's';
                p.style.background = 'rgba(216, 180, 254, 0.25)';
                container.appendChild(p);
            }
        }
        createParticles();

        function intentarLogin() {
            if (pwdInput.value.toLowerCase().trim() === PASSWORD_CORRECTA) {
                document.getElementById('loginBtnText').innerHTML = '<svg class="animate-spin h-7 w-7 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
                setTimeout(() => {
                    document.getElementById('loginScreen').classList.add('opacity-0');
                    setTimeout(() => {
                        document.getElementById('loginScreen').classList.add('hidden');
                        const mp = document.getElementById('mainPlayer');
                        mp.classList.remove('hidden');
                        setTimeout(() => { mp.classList.remove('opacity-0', 'scale-95'); cargarTrack(0); }, 200);
                    }, 2000);
                }, 800);
            } else { pwdInput.value = ''; }
        }
        loginBtn.addEventListener('click', intentarLogin);
        pwdInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') intentarLogin(); });

        function fadeAudio(audioOut, audioIn) {
            clearInterval(fadeOutInt); clearInterval(fadeInInt);
            if (audioOut && !audioOut.paused) {
                let v = audioOut.volume;
                fadeOutInt = setInterval(() => { v -= 0.05; if (v <= 0) { audioOut.volume = 0; audioOut.pause(); clearInterval(fadeOutInt); } else audioOut.volume = v; }, 100);
            }
            if (audioIn) {
                audioIn.load(); audioIn.volume = 0;
                audioIn.play().then(() => { let v = 0; fadeInInt = setInterval(() => { v += 0.05; if (v >= 1) { audioIn.volume = 1; clearInterval(fadeInInt); } else audioIn.volume = v; }, 100); }).catch(() => { });
            }
        }

        function cargarTrack(index, direction = null) {
            const track = playlist[index];
            currentSeconds = 0; canHighlightLyrics = false;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('currentTime').textContent = '0:00';
            document.getElementById('totalTime').textContent = Math.floor(track.duration/60) + ":" + (track.duration%60).toString().padStart(2, '0');
            
            const info = document.getElementById('trackInfoContainer'), wrap = document.getElementById('lyricsWrapper'), container = document.getElementById('lyricsContainer');
            container.scrollTop = 0; 
            clearTimeout(t1); clearTimeout(t2); clearTimeout(t3);
            
            info.style.opacity = 0; wrap.style.opacity = 0;
            setTimeout(() => {
                wrap.classList.add('hidden'); wrap.classList.remove('flex');
                info.classList.remove('hidden'); info.classList.add('flex');
                document.getElementById('trackTitle').textContent = track.title;
                document.getElementById('trackArtist').textContent = track.artist;
                info.style.opacity = 1;

                container.innerHTML = '';
                track.lyrics.forEach((l, i) => {
                    const p = document.createElement('p'); p.className = 'lyric-line py-2'; p.id = `line-${i}`; p.textContent = l;
                    container.appendChild(p);
                });

                if (isPlaying) {
                    t1 = setTimeout(() => {
                        info.style.opacity = 0;
                        t2 = setTimeout(() => {
                            info.classList.add('hidden'); wrap.classList.remove('hidden'); wrap.classList.add('flex');
                            container.scrollTop = 0;
                            t3 = setTimeout(() => { wrap.style.opacity = 1; setTimeout(() => { canHighlightLyrics = true; }, 800); }, 50);
                        }, 2000);
                    }, 4000);
                }
            }, 800);

            let cImg = document.getElementById('coverImg'), nImg = document.getElementById('coverImgNext');
            if (direction) {
                nImg.src = track.img; nImg.classList.remove('hidden', 'slide-left', 'slide-right');
                nImg.classList.add(direction === 'next' ? 'slide-right' : 'slide-left');
                void nImg.offsetWidth;
                cImg.classList.remove('slide-center');
                cImg.classList.add(direction === 'next' ? 'slide-left' : 'slide-right');
                nImg.classList.remove('slide-right', 'slide-left'); nImg.classList.add('slide-center');
                setTimeout(() => { cImg.src = track.img; cImg.className = 'slide-item slide-center w-full h-full object-cover object-center'; nImg.classList.add('hidden'); }, 2800);
            } else { cImg.src = track.img; }
        }

        function updateProgress() {
            const track = playlist[currentTrack];
            currentSeconds += 0.1;
            document.getElementById('progressBar').style.width = (currentSeconds / track.duration * 100) + '%';
            document.getElementById('currentTime').textContent = Math.floor(currentSeconds/60) + ":" + Math.floor(currentSeconds%60).toString().padStart(2, '0');

            if (canHighlightLyrics) {
                const offset = 7.5; 
                const progress = Math.max(0, currentSeconds - offset);
                const totalLyricTime = track.duration - offset;
                const idx = Math.min(Math.floor((progress / totalLyricTime) * track.lyrics.length), track.lyrics.length - 1);

                document.querySelectorAll('.lyric-line').forEach((l, i) => {
                    if(i === idx) { if(!l.classList.contains('lyric-active')) { l.classList.add('lyric-active'); l.scrollIntoView({ behavior: 'smooth', block: 'center' }); } }
                    else l.classList.remove('lyric-active');
                });
            } else {
                const first = document.getElementById('line-0'); if (first) first.classList.add('lyric-active');
            }
            if (currentSeconds >= track.duration) siguienteTrack();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const track = playlist[currentTrack], glow = document.getElementById('glowCover'), info = document.getElementById('trackInfoContainer'), wrap = document.getElementById('lyricsWrapper'), container = document.getElementById('lyricsContainer');

            if (isPlaying) {
                if (isFirstPlay) { activeAudio.src = track.audio; activeAudio.play(); isFirstPlay = false; } else activeAudio.play();
                document.getElementById('playIcon').classList.add('hidden'); document.getElementById('pauseIcon').classList.remove('hidden');
                glow.classList.add('glow-active');
                info.style.opacity = 0;
                t2 = setTimeout(() => { info.classList.add('hidden'); wrap.classList.remove('hidden'); wrap.classList.add('flex'); container.scrollTop = 0; t3 = setTimeout(() => { wrap.style.opacity = 1; setTimeout(() => { canHighlightLyrics = true; }, 800); }, 50); }, 2000);
                progressInterval = setInterval(updateProgress, 100);
            } else {
                document.getElementById('playIcon').classList.remove('hidden'); document.getElementById('pauseIcon').classList.add('hidden');
                glow.classList.remove('glow-active'); activeAudio.pause(); clearInterval(progressInterval);
                wrap.style.opacity = 0; canHighlightLyrics = false;
                t2 = setTimeout(() => { wrap.classList.add('hidden'); info.classList.remove('hidden'); info.classList.add('flex'); t3 = setTimeout(() => { info.style.opacity = 1; }, 50); }, 1500);
            }
        }

        function siguienteTrack() {
            clearInterval(progressInterval);
            if (currentTrack === playlist.length - 1) {
                isPlaying = false; crearConfeti();
                setTimeout(() => { activeAudio.pause(); document.getElementById('blackoutScreen').classList.remove('hidden'); document.getElementById('blackoutScreen').classList.add('broken-bulb-active'); }, 4000); return;
            }
            const old = activeAudio, next = activeAudio === audio1 ? audio2 : audio1;
            currentTrack++; next.src = playlist[currentTrack].audio; fadeAudio(old, next); activeAudio = next; cargarTrack(currentTrack, 'next');
            if (isPlaying) progressInterval = setInterval(updateProgress, 100);
        }

        function saltarTrackManual(dir) {
            clearInterval(progressInterval); const was = isPlaying;
            const old = activeAudio, next = activeAudio === audio1 ? audio2 : audio1;
            if (dir === 'next') currentTrack++; else currentTrack--;
            next.src = playlist[currentTrack].audio;
            if (was) fadeAudio(old, next); else { old.pause(); isFirstPlay = true; }
            activeAudio = next; cargarTrack(currentTrack, dir);
            if (was) { progressInterval = setInterval(updateProgress, 100); }
        }

        document.getElementById('playBtn').addEventListener('click', togglePlay);
        document.getElementById('prevBtn').addEventListener('click', () => { if (currentTrack > 0) saltarTrackManual('prev'); });
        document.getElementById('nextBtn').addEventListener('click', () => { if (currentTrack < playlist.length - 1) saltarTrackManual('next'); });

        function crearConfeti() {
            for (let i = 0; i < 150; i++) {
                const c = document.createElement('div'); c.classList.add('confetti');
                c.style.backgroundColor = ['#d8b4fe', '#c084fc', '#ffffff', '#ffd700'][Math.floor(Math.random()*4)];
                c.style.left = Math.random() * 100 + 'vw';
                const d = Math.random() * 3 + 4; c.style.animationDuration = d + 's';
                document.body.appendChild(c); setTimeout(() => c.remove(), d * 1000 + 1000);
            }
        }
    </script>
</body>
</html>
