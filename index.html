    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Joseline</title>
        <!-- Tailwind CSS para diseño rápido -->
        <script src="https://cdn.tailwindcss.com"></script>
        <!-- Enlace a tu archivo CSS -->
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="min-h-[100dvh] liquid-bg flex items-start justify-center p-4 pt-12 text-white font-sans overflow-hidden relative">

        <!-- Pantalla de Apagón Final -->
        <div id="blackoutScreen" class="fixed inset-0 z-[100] bg-black hidden pointer-events-none"></div>
        
        <!-- Contenedor para las partículas flotantes -->
        <div id="particles-container" class="fixed inset-0 pointer-events-none z-0"></div>

        <!-- Reproductores de Audio para el efecto de mezcla -->
        <audio id="audio1" preload="auto"></audio>
        <audio id="audio2" preload="auto"></audio>

        <!-- 1. PANTALLA DE ACCESO (PASSWORD) -->
        <div id="loginScreen" class="absolute inset-0 z-50 flex items-center justify-center bg-[#0d041a]/95 backdrop-blur-3xl transition-opacity duration-[2000ms]">
            <div class="w-full max-w-[320px] flex flex-col items-center gap-10 relative z-10">
                <div class="relative w-full">
                    <input type="password" id="pwdInput" 
                        class="w-full glass bg-white/5 rounded-full px-6 py-5 text-white placeholder-white/20 outline-none text-center text-3xl tracking-[0.4em] font-light shadow-2xl border border-white/20" 
                        placeholder="••••••" autocomplete="off">
                </div>
                <button id="loginBtn" class="w-20 h-20 rounded-full bg-white/10 flex items-center justify-center transition-all duration-700 transform hover:scale-110 shadow-xl border border-white/10 group">
                    <span id="loginBtnText" class="relative z-10">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-8 h-8 group-hover:translate-x-1 transition-transform"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </span>
                </button>
            </div>
        </div>

        <!-- 2. REPRODUCTOR PRINCIPAL -->
        <div id="mainPlayer" class="w-full max-w-[360px] h-[82dvh] max-h-[720px] flex flex-col justify-between p-6 glass rounded-[2.5rem] opacity-0 scale-95 transition-all duration-[1500ms] hidden shadow-2xl">
            
            <div class="text-center w-full z-10 pt-2">
                <p class="text-[10px] font-bold text-white/40 tracking-[0.5em] uppercase">Para: Joseline</p>
            </div>

            <!-- Portada de la canción -->
            <div class="relative mt-4 mb-4 z-10 mx-auto w-[82%]">
                <div id="glowCover" class="cover-glow"></div>
                <div id="coverContainer" class="w-full aspect-square rounded-[2rem] shadow-[0_20px_60px_rgba(0,0,0,0.8)] slide-container border border-white/5">
                    <img id="coverImg" src="" alt="Portada" class="slide-item slide-center w-full h-full object-cover object-center">
                    <img id="coverImgNext" src="" alt="Portada" class="slide-item slide-right w-full h-full object-cover object-center hidden">
                </div>
            </div>

            <!-- Zona de Letras e Información -->
            <div class="flex-1 w-full relative mb-4 z-10 min-h-[150px] flex flex-col justify-center overflow-hidden">
                <!-- Letras (Se activan al dar Play) -->
                <div id="lyricsWrapper" class="absolute inset-0 overflow-hidden hidden flex-col transition-opacity duration-[1500ms] opacity-0">
                    <div id="lyricsContainer" class="flex-1 overflow-y-auto px-2 pb-8 pt-2 space-y-8"></div>
                </div>

                <!-- Información (Título y Artista) -->
                <div id="trackInfoContainer" class="absolute inset-0 flex flex-col items-center justify-center transition-opacity duration-[1500ms] opacity-100 text-center text-balance">
                    <h1 id="trackTitle" class="text-2xl font-bold tracking-tight text-white mb-2 px-2">Título</h1>
                    <p id="trackArtist" class="text-purple-300/60 text-lg font-light">Artista</p>
                </div>
            </div>

            <!-- Barra de Progreso Minimalista -->
            <div class="mb-6 z-10 px-2">
                <div class="w-full bg-white/10 rounded-full h-[2px] relative">
                    <div id="progressBar" class="bg-white h-full rounded-full w-0 relative transition-all duration-300 ease-linear shadow-[0_0_10px_white]">
                        <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-white rounded-full shadow-lg"></div>
                    </div>
                </div>
                <div class="flex justify-between text-[10px] text-white/20 mt-3 font-mono">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>

            <!-- Controles de Reproducción -->
            <div class="flex justify-center items-center gap-8 mb-4 z-10">
                <button id="prevBtn" class="text-white/30 hover:text-white transition-all duration-500">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                
                <button id="playBtn" class="bg-white text-purple-950 rounded-full btn-play-container hover:scale-105 transition-all duration-500 shadow-2xl relative">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10 ml-1 absolute"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10 hidden absolute"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                
                <button id="nextBtn" class="text-white/30 hover:text-white transition-all duration-500">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        </div>

        <!-- Enlace a tu archivo JavaScript -->
        <script src="script.js"></script>
    </body>
    </html>
